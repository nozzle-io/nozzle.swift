name: CI
on:
  push:
    branches: [main, stable]
  pull_request:
    branches: [main, stable]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Bootstrap nozzle
        run: ./Scripts/bootstrap.sh

      - name: Build
        run: swift build

      - name: Test
        run: swift test
